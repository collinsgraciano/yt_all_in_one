{% extends "base.html" %}
{% block title %}任务详情 - 有声书管理系统{% endblock %}
{% block nav_tasks %}active{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h3><i class="bi bi-list-task"></i> 任务详情</h3>
    <a href="/tasks" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i> 返回列表</a>
</div>

<div class="card p-4 mb-3">
    <div class="row">
        <div class="col-md-3"><small class="text-muted">任务 ID</small><br><code>{{ task_id }}</code></div>
        <div class="col-md-3"><small class="text-muted">频道</small><br><span id="t-channel">-</span></div>
        <div class="col-md-2"><small class="text-muted">状态</small><br><span id="t-status">-</span></div>
        <div class="col-md-2"><small class="text-muted">开始时间</small><br><span id="t-started">-</span></div>
        <div class="col-md-2"><small class="text-muted">结束时间</small><br><span id="t-finished">-</span></div>
    </div>
    <div class="row mt-2">
        <div class="col-md-6"><small class="text-muted">停止原因</small><br><span id="t-stop-reason">-</span></div>
        <div class="col-md-6"><small class="text-muted">错误信息</small><br><span id="t-error" class="text-danger">-</span></div>
    </div>
    <div class="mt-3">
        <button class="btn btn-outline-danger btn-sm" id="stop-btn" onclick="stopTask()" style="display:none;"><i class="bi bi-stop-circle"></i> 停止任务</button>
        <button class="btn btn-outline-warning btn-sm" id="force-delete-btn" onclick="forceDeleteTask()" style="display:none;"><i class="bi bi-trash-fill"></i> 强制删除</button>
        <button class="btn btn-outline-secondary btn-sm" onclick="clearLogs()"><i class="bi bi-trash"></i> 清空显示</button>
        <span class="ms-2 text-muted small" id="log-count">0 条日志</span>
    </div>
</div>

<div class="card p-3">
    <h5><i class="bi bi-terminal"></i> 实时日志 <span class="spinner-border spinner-border-sm text-primary ms-2" id="log-spinner" style="display:none;"></span></h5>
    <div class="log-container" id="log-container"></div>
</div>
{% endblock %}

{% block scripts %}
<script>
const TASK_ID = '{{ task_id }}';
let lastLogId = 0;
let logCount = 0;
let polling = true;

async function loadTaskDetail() {
    try {
        const t = await api(`/api/tasks/${TASK_ID}`);
        document.getElementById('t-channel').textContent = t.channel_display_name || t.channel_name;
        document.getElementById('t-status').innerHTML = statusBadge(t.status);
        document.getElementById('t-started').textContent = fmtTime(t.started_at);
        document.getElementById('t-finished').textContent = fmtTime(t.finished_at);
        document.getElementById('t-stop-reason').textContent = t.stop_reason || '-';
        document.getElementById('t-error').textContent = t.error_msg || '-';
        const stopBtn = document.getElementById('stop-btn');
        stopBtn.style.display = (t.status === 'running' || t.status === 'queued') ? 'inline-block' : 'none';
        const forceDelBtn = document.getElementById('force-delete-btn');
        forceDelBtn.style.display = (t.status === 'stopping') ? 'inline-block' : 'none';
        if (t.status !== 'running' && t.status !== 'queued' && t.status !== 'stopping') {
            polling = false;
            document.getElementById('log-spinner').style.display = 'none';
        }
    } catch (e) { showToast('加载失败: ' + e.message, 'danger'); }
}

async function pollLogs() {
    if (!polling) return;
    try {
        const data = await api(`/api/tasks/${TASK_ID}/logs/recent?after_id=${lastLogId}&limit=500`);
        if (data.logs && data.logs.length > 0) {
            const container = document.getElementById('log-container');
            for (const log of data.logs) {
                const div = document.createElement('div');
                div.className = `log-line ${log.log_level}`;
                div.textContent = `[${log.log_level}] ${log.message}`;
                container.appendChild(div);
                lastLogId = Math.max(lastLogId, log.id);
                logCount++;
            }
            container.scrollTop = container.scrollHeight;
            document.getElementById('log-count').textContent = `${logCount} 条日志`;
        }
    } catch (e) {}
    setTimeout(pollLogs, 2000);
}

async function stopTask() {
    if (!confirm('确认停止该任务？')) return;
    try {
        await api(`/api/tasks/${TASK_ID}/stop`, { method: 'POST' });
        showToast('停止请求已发送');
        loadTaskDetail();
    } catch (e) { showToast('停止失败: ' + e.message, 'danger'); }
}

async function forceDeleteTask() {
    if (!confirm('⚠️ 确认强制删除该任务？\n该任务处于“停止中”状态，pipeline 线程可能已死亡。\n强制删除将直接移除任务记录。')) return;
    try {
        await api(`/api/tasks/${TASK_ID}?force=true`, { method: 'DELETE' });
        showToast('任务已强制删除');
        window.location.href = '/tasks';
    } catch (e) { showToast('强制删除失败: ' + e.message, 'danger'); }
}

function clearLogs() {
    document.getElementById('log-container').innerHTML = '';
    logCount = 0;
    document.getElementById('log-count').textContent = '0 条日志';
}

loadTaskDetail();
pollLogs();
setInterval(loadTaskDetail, 5000);
</script>
{% endblock %}
