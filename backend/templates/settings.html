{% extends "base.html" %}
{% block title %}全局设置 - 有声书管理系统{% endblock %}
{% block nav_settings %}active{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h3><i class="bi bi-gear"></i> 全局设置</h3>
    <div class="d-flex align-items-center gap-2">
        <div class="input-group input-group-sm" style="width: 220px;">
            <input type="text" class="form-control" id="searchBox" placeholder="搜索配置项..." oninput="filterSettings()">
            <button class="btn btn-outline-secondary" type="button" onclick="document.getElementById('searchBox').value='';filterSettings()">
                <i class="bi bi-x"></i>
            </button>
        </div>
    </div>
</div>

<p class="text-muted mb-3">全局共享设置会被所有频道继承，频道级配置可覆盖此处设置。点击分类标题可折叠/展开。</p>

<!-- 磁盘空间管理 -->
<div class="card mb-4 border-warning" id="disk-card">
    <div class="card-header bg-light d-flex align-items-center justify-content-between">
        <span class="fw-bold"><i class="bi bi-hdd-stack text-warning"></i> 磁盘空间管理</span>
        <button class="btn btn-sm btn-outline-secondary" onclick="loadDiskUsage()"><i class="bi bi-arrow-clockwise"></i> 刷新</button>
    </div>
    <div class="card-body" id="disk-body">
        <p class="text-muted"><i class="bi bi-hourglass-split"></i> 加载中...</p>
    </div>
</div>

<div id="settings-container"></div>

<!-- 浮动保存按钮 -->
<div id="floating-save-bar" class="position-fixed bottom-0 end-0 p-3" style="z-index: 1000;">
    <button class="btn btn-primary shadow" onclick="saveAll()" id="btn-save-all">
        <i class="bi bi-save"></i> 保存全部
    </button>
</div>
{% endblock %}

{% block scripts %}
<script>
let globalKeys = [];
let keySchema = {};       // key → { type, label, default, options, ... }
let categoryOrder = [];   // 保持分类顺序
let allSettingsRaw = [];  // 原始数据，供搜索过滤

async function loadSettings() {
    try {
        const [schemaData, settingsData] = await Promise.all([
            api('/api/config/schema'),
            api('/api/config/global-settings'),
        ]);
        globalKeys = schemaData.global_keys || [];
        const globalSet = new Set(globalKeys);

        // 构建 key → schema 映射 + 按 schema 中的分类顺序整理
        keySchema = {};
        const categories = schemaData.categories || {};
        categoryOrder = Object.keys(categories);
        for (const [cat, items] of Object.entries(categories)) {
            for (const item of items) {
                keySchema[item.key] = item;
            }
        }

        allSettingsRaw = settingsData.settings || [];

        const container = document.getElementById('settings-container');
        let html = '';

        for (const cat of categoryOrder) {
            const items = (categories[cat] || []).filter(item => globalSet.has(item.key));
            if (items.length === 0) continue;

            const searchVal = (document.getElementById('searchBox')?.value || '').toLowerCase().trim();
            const filteredItems = searchVal
                ? items.filter(item => {
                    const s = keySchema[item.key] || {};
                    const label = (s.label || item.key).toLowerCase();
                    const desc = (s.description || '').toLowerCase();
                    return label.includes(searchVal) || item.key.toLowerCase().includes(searchVal) || desc.includes(searchVal);
                  })
                : items;

            if (filteredItems.length === 0) continue;

            const catId = cat.replace(/[^a-zA-Z0-9\u4e00-\u9fa5]/g, '');
            const shownCount = filteredItems.length;
            const totalCount = items.length;

            html += `
            <div class="card mb-3 category-card" data-category="${cat}">
                <div class="card-header d-flex align-items-center justify-content-between" style="cursor:pointer" onclick="toggleCategory('${catId}')">
                    <span class="fw-bold"><i class="bi bi-chevron-down toggle-icon" id="icon-${catId}"></i> ${cat}</span>
                    <span class="badge bg-secondary">${shownCount === totalCount ? shownCount : shownCount + '/' + totalCount} 项</span>
                </div>
                <div class="card-body" id="body-${catId}">
                    <div class="row">`;

            for (const item of filteredItems) {
                const key = item.key;
                const schema = keySchema[key] || {};
                const setting = allSettingsRaw.find(s => s.setting_key === key);
                const rawVal = setting?.setting_value ?? '';
                const label = schema.label || key;
                const desc = schema.description || setting?.description || '';
                const readonly = schema.readonly;

                let input;
                if (schema.type === 'bool') {
                    const checked = rawVal === true || rawVal === 'true' || rawVal === 'True' || rawVal === '1';
                    input = `<div class="form-check form-switch mt-2">
                        <input class="form-check-input" type="checkbox" data-key="${key}" data-type="bool" ${checked ? 'checked' : ''} ${readonly ? 'disabled' : ''}>
                        <label class="form-check-label small">${label}</label>
                    </div>`;
                } else if (schema.type === 'enum') {
                    const options = (schema.options || []).map(o =>
                        `<option value="${o}" ${String(rawVal) === String(o) ? 'selected' : ''}>${o}</option>`
                    ).join('');
                    input = `<label class="form-label small fw-bold">${label}</label>
                        <select class="form-select form-select-sm" data-key="${key}" data-type="enum" ${readonly ? 'disabled' : ''}>${options}</select>`;
                } else if (schema.type === 'int' || schema.type === 'float') {
                    const step = schema.type === 'float' ? (schema.step || '0.1') : (schema.step || '1');
                    input = `<label class="form-label small fw-bold">${label}</label>
                        <input type="number" class="form-control form-control-sm" data-key="${key}" data-type="${schema.type}" value="${rawVal}" ${schema.min !== undefined ? `min="${schema.min}"` : ''} ${schema.max !== undefined ? `max="${schema.max}"` : ''} step="${step}" ${readonly ? 'readonly' : ''}>`;
                } else {
                    // 所有文本字段（含密钥）统一显示真实值，单人使用无需隐藏
                    input = `<label class="form-label small fw-bold">${label}${readonly ? ' <span class="badge bg-light text-secondary">只读</span>' : ''}</label>
                        <input type="text" class="form-control form-control-sm" data-key="${key}" data-type="str" value="${rawVal}" placeholder="输入值..." ${readonly ? 'readonly' : ''}>`;
                }

                html += `<div class="col-md-6 mb-3">${input}${desc ? `<small class="text-muted d-block mt-1">${desc}</small>` : ''}</div>`;
            }

            html += `    </div>
                </div>
            </div>`;
        }

        if (!html) html = '<p class="text-muted">无匹配的配置项</p>';
        container.innerHTML = html;
    } catch (e) { showToast('加载失败: ' + e.message, 'danger'); }
}

function toggleCategory(catId) {
    const body = document.getElementById('body-' + catId);
    const icon = document.getElementById('icon-' + catId);
    if (body.style.display === 'none') {
        body.style.display = '';
        icon.classList.replace('bi-chevron-right', 'bi-chevron-down');
    } else {
        body.style.display = 'none';
        icon.classList.replace('bi-chevron-down', 'bi-chevron-right');
    }
}

function filterSettings() {
    loadSettings();
}

async function saveAll() {
    const inputs = document.querySelectorAll('[data-key]');
    const toSave = [];

    for (const input of inputs) {
        if (input.disabled || input.readOnly) continue;

        const key = input.dataset.key;
        const type = input.dataset.type || 'str';

        let val;
        if (type === 'bool') {
            val = input.checked ? 'true' : 'false';
        } else if (input.tagName === 'SELECT') {
            val = input.value;
        } else {
            val = input.value.trim();
        }

        // 统一处理：跳过空值和脱敏占位符（兼容旧逻辑）
        if (!val) continue;
        if (val.includes('****')) continue;

        toSave.push({ key, value: val });
    }

    if (toSave.length === 0) {
        showToast('没有需要保存的更改', 'info');
        return;
    }

    try {
        const result = await api('/api/config/global-settings/batch', {
            method: 'POST',
            body: JSON.stringify({ settings: toSave }),
        });
        if (result.errors && result.errors.length > 0) {
            const errKeys = result.errors.map(e => e.key).join(', ');
            showToast(`保存部分失败: ${errKeys}`, 'danger');
        } else {
            showToast(result.message || `已保存 ${result.saved} 项设置`);
        }
    } catch (e) {
        showToast('批量保存失败: ' + e.message, 'danger');
    }
    loadSettings();
}

loadSettings();
loadDiskUsage();

// ==================== 磁盘空间管理 ====================

async function loadDiskUsage() {
    const body = document.getElementById('disk-body');
    try {
        const data = await api('/api/system/disk-usage');
        if (!data.exists) {
            body.innerHTML = `<div class="alert alert-warning mb-0"><i class="bi bi-exclamation-triangle"></i> 输出目录不存在: <code>${data.output_root}</code></div>`;
            return;
        }

        // 进度条颜色: <70% 绿, <85% 黄, >=85% 红
        const pct = data.disk_used_percent;
        let barClass = 'bg-success';
        if (pct >= 85) barClass = 'bg-danger';
        else if (pct >= 70) barClass = 'bg-warning';

        body.innerHTML = `
        <div class="row mb-3">
            <div class="col-md-6">
                <div class="small text-muted">输出目录</div>
                <code class="text-dark">${data.output_root}</code>
            </div>
            <div class="col-md-6 text-md-end">
                <div class="small text-muted">目录条目数</div>
                <span class="fw-bold">${data.item_count}</span>
            </div>
        </div>
        <div class="row mb-3">
            <div class="col-md-4">
                <div class="border rounded p-2 text-center">
                    <div class="small text-muted">输出目录占用</div>
                    <div class="fs-5 fw-bold text-info">${data.total_mb} MB</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="border rounded p-2 text-center">
                    <div class="small text-muted">磁盘已用</div>
                    <div class="fs-5 fw-bold text-warning">${data.disk_used_gb} GB</div>
                    <div class="small text-muted">${pct}%</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="border rounded p-2 text-center">
                    <div class="small text-muted">磁盘剩余</div>
                    <div class="fs-5 fw-bold ${pct >= 85 ? 'text-danger' : 'text-success'}">${data.disk_free_gb} GB</div>
                    <div class="small text-muted">/ ${data.disk_total_gb} GB</div>
                </div>
            </div>
        </div>
        <div class="progress mb-3" style="height: 8px;">
            <div class="progress-bar ${barClass}" role="progressbar" style="width: ${pct}%" aria-valuenow="${pct}" aria-valuemin="0" aria-valuemax="100"></div>
        </div>
        <div class="d-flex justify-content-between align-items-center">
            <div class="small text-muted">
                <i class="bi bi-info-circle"></i> 清空将删除输出目录中所有书籍的中间文件和成品文件（包括结果报告和上传回执），仅保留目录本身。任务运行中无法清空。
            </div>
            <button class="btn btn-danger btn-sm" onclick="clearOutputRoot()" id="btn-clear-output">
                <i class="bi bi-trash"></i> 清空输出目录
            </button>
        </div>`;
    } catch (e) {
        body.innerHTML = `<div class="alert alert-danger mb-0">加载失败: ${e.message}</div>`;
    }
}

async function clearOutputRoot() {
    const msg = '⚠️ 确认清空输出目录？\n\n这将删除所有书籍的中间文件、成品音频、视频、封面和上传回执！\n\n断点续跑信息存储在数据库中不受影响，但已生成未上传的成品将无法恢复。\n\n请确保当前没有任务在运行。';
    if (!confirm(msg)) return;

    // 二次确认
    if (!confirm('再次确认：真的要清空所有输出文件吗？此操作不可撤销！')) return;

    const btn = document.getElementById('btn-clear-output');
    btn.disabled = true;
    btn.innerHTML = '<i class="bi bi-hourglass-split"></i> 清空中...';

    try {
        const result = await api('/api/system/clear-output', {
            method: 'POST',
            body: JSON.stringify({ confirm: true }),
        });
        showToast(result.message || '清空完成', 'success');
        loadDiskUsage();
    } catch (e) {
        showToast('清空失败: ' + e.message, 'danger');
    } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-trash"></i> 清空输出目录';
    }
}
</script>
{% endblock %}
