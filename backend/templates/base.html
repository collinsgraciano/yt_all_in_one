<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}有声书管理系统{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f5f7fa; }
        .sidebar { min-height: calc(100vh - 56px); background: #fff; border-right: 1px solid #e0e6ed; }
        .sidebar .nav-link { color: #495057; border-radius: 8px; margin: 2px 8px; padding: 8px 16px; }
        .sidebar .nav-link:hover { background: #eef2f7; }
        .sidebar .nav-link.active { background: #0d6efd; color: #fff; }
        .card { border: none; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
        .stat-card { border-left: 4px solid #0d6efd; }
        .badge-running { background: #0d6efd; }
        .badge-success { background: #198754; }
        .badge-failed  { background: #dc3545; }
        .badge-queued  { background: #6c757d; }
        .badge-cancelled { background: #fd7e14; }
        .badge-stopping { background: #6f42c1; }
        .log-container { max-height: 600px; overflow-y: auto; background: #1e1e1e; border-radius: 8px; padding: 12px; font-family: 'Consolas', monospace; font-size: 13px; }
        .log-line { color: #d4d4d4; margin: 0; padding: 1px 0; }
        .log-line.INFO { color: #4ec9b0; }
        .log-line.WARNING { color: #dcdcaa; }
        .log-line.ERROR { color: #f44747; }
        .log-line.DEBUG { color: #569cd6; }
        .sidebar .nav-link.sub-link { padding-left: 32px; font-size: 0.9em; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">
    <a class="navbar-brand" href="/"><i class="bi bi-collection-play"></i> 有声书 YouTube 管理系统</a>
    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="/api/docs" target="_blank"><i class="bi bi-code-slash"></i> API</a></li>
            <li class="nav-item"><a class="nav-link" href="/logout"><i class="bi bi-box-arrow-right"></i> 登出</a></li>
        </ul>
    </div>
</nav>

<div class="container-fluid">
<div class="row">
    <div class="col-md-2 sidebar py-3">
        <ul class="nav flex-column">
            <li class="nav-item"><a class="nav-link {% block nav_dashboard %}{% endblock %}" href="/"><i class="bi bi-speedometer2"></i> 仪表盘</a></li>
            <li class="nav-item"><a class="nav-link {% block nav_channels %}{% endblock %}" href="/channels"><i class="bi bi-youtube"></i> 频道管理</a></li>
            <li class="nav-item"><a class="nav-link {% block nav_tasks %}{% endblock %}" href="/tasks"><i class="bi bi-list-task"></i> 任务管理</a></li>
            <li class="nav-item"><a class="nav-link {% block nav_books %}{% endblock %}" href="/books"><i class="bi bi-book"></i> 书籍管理</a></li>
            <li class="nav-item">
                <a class="nav-link {% block nav_tests %}{% endblock %}" href="#tests-submenu" data-bs-toggle="collapse" role="button" aria-expanded="false" aria-controls="tests-submenu">
                    <i class="bi bi-flask"></i> 测试实验 <i class="bi bi-chevron-down float-end small"></i>
                </a>
                <div class="collapse {% block nav_tests_show %}{% endblock %}" id="tests-submenu">
                    <ul class="nav flex-column">
                        <li class="nav-item"><a class="nav-link sub-link {% block nav_test_ai %}{% endblock %}" href="/tests/ai"><i class="bi bi-robot"></i> AI测试</a></li>
                        <li class="nav-item"><a class="nav-link sub-link {% block nav_test_upload %}{% endblock %}" href="/tests/upload"><i class="bi bi-youtube"></i> 上传测试</a></li>
                        <li class="nav-item"><a class="nav-link sub-link {% block nav_test_tg %}{% endblock %}" href="/tests/tg-download"><i class="bi bi-cloud-download"></i> TG音频下载</a></li>
                        <li class="nav-item"><a class="nav-link sub-link {% block nav_test_bgm %}{% endblock %}" href="/tests/bgm"><i class="bi bi-music-note-beamed"></i> BGM混音测试</a></li>
                    </ul>
                </div>
            </li>
            <li class="nav-item"><a class="nav-link {% block nav_settings %}{% endblock %}" href="/settings"><i class="bi bi-gear"></i> 全局设置</a></li>
        </ul>
    </div>
    <div class="col-md-10 p-4">
        {% block content %}{% endblock %}
    </div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
// 通用 API 工具
async function api(url, options = {}) {
    const res = await fetch(url, {
        headers: { 'Content-Type': 'application/json', ...options.headers },
        ...options,
    });
    if (!res.ok) {
        const err = await res.json().catch(() => ({ detail: res.statusText }));
        throw new Error(err.detail || '请求失败');
    }
    return res.json();
}

function showToast(message, type = 'success') {
    const toast = document.createElement('div');
    toast.className = `toast align-items-center text-bg-${type} border-0 position-fixed top-0 end-0 m-3`;
    toast.style.zIndex = '9999';
    toast.innerHTML = `<div class="d-flex"><div class="toast-body">${message}</div><button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button></div>`;
    document.body.appendChild(toast);
    new bootstrap.Toast(toast, { delay: 3000 }).show();
    toast.addEventListener('hidden.bs.toast', () => toast.remove());
}

function fmtTime(s) {
    if (!s) return '-';
    return new Date(s).toLocaleString('zh-CN');
}

function statusBadge(status) {
    const map = { running: '运行中', success: '成功', failed: '失败', queued: '排队中', cancelled: '已取消', stopping: '停止中', already_running: '运行中' };
    return `<span class="badge badge-${status}">${map[status] || status}</span>`;
}
</script>
{% block scripts %}{% endblock %}
</body>
</html>
