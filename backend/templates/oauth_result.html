{% extends "base.html" %}
{% block title %}OAuth 授权结果{% endblock %}

{% block content %}
<div class="d-flex justify-content-center align-items-center" style="min-height: 400px;">
    <div class="text-center">
        {% if success %}
        <i class="bi bi-check-circle-fill text-success" style="font-size: 64px;"></i>
        <h3 class="mt-3">授权成功！</h3>
        <p class="text-muted">频道 <code>{{ channel }}</code> 的 YouTube OAuth 授权已完成。</p>
        <a href="/channels/{{ channel }}" class="btn btn-primary mt-2">返回频道详情</a>
        {% else %}
        <i class="bi bi-x-circle-fill text-danger" style="font-size: 64px;"></i>
        <h3 class="mt-3">授权失败</h3>
        <p class="text-danger">{{ message }}</p>
        <a href="/channels" class="btn btn-primary mt-2">返回频道列表</a>
        {% endif %}
    </div>
</div>
{% endblock %}
