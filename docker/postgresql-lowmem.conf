# ═══════════════════════════════════════════════════════════════
# PostgreSQL 低内存配置 — 专为 1C2G VPS 优化
# ═══════════════════════════════════════════════════════════════
# 将 PostgreSQL 内存占用控制在 ~150MB 以内，
# 为 Python Web 进程和 pipeline 留出 ~1.7GB 可用内存。
# ═══════════════════════════════════════════════════════════════

# ─── 网络（必须，否则容器间无法连接）───
listen_addresses = '*'
unix_socket_directories = '/var/run/postgresql'

# ─── 内存 ───
shared_buffers = 32MB
work_mem = 2MB
maintenance_work_mem = 16MB
effective_cache_size = 256MB
temp_buffers = 4MB

# ─── WAL / 检查点 ───
wal_buffers = 1MB
checkpoint_completion_target = 0.7
max_wal_size = 256MB
min_wal_size = 64MB

# ─── 并发连接 ───
max_connections = 20

# ─── 自动清理 ───
autovacuum = on
autovacuum_max_workers = 1
autovacuum_naptime = 60s

# ─── 并行查询（1C 环境禁用）───
max_worker_processes = 2
max_parallel_workers = 1
max_parallel_workers_per_gather = 0

# ─── 磁盘 I/O 优化 ───
random_page_cost = 2.0
effective_io_concurrency = 1

# ─── 日志（减少 I/O）───
log_min_duration_statement = 0
log_statement = 'none'
