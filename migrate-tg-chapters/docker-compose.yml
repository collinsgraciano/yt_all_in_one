# ═══════════════════════════════════════════════════════════════
# 数据迁移工具 — 独立 Docker 运行（books + audiobook_chapters 两表）
# ═══════════════════════════════════════════════════════════════
# 无需安装 Python，直接在容器中运行
#
# 用法:
#   # Linux / macOS / VPS
#   bash run.sh --all               # 迁移两张表（推荐先迁移 books 再迁移 chapters）
#   bash run.sh --books             # 仅迁移 books 表
#   bash run.sh --chapters          # 仅迁移 audiobook_chapters 表
#   bash run.sh --bg --all          # 后台运行（断开 SSH 不中断）
#   bash run.sh --all --dry-run     # 试运行（不写入数据）
#
#   # Windows CMD
#   run.bat --all
#   run.bat --books
#   run.bat --chapters --only-complete-books
#   run.bat --bg --all
#
#   # 直接用 docker-compose
#   docker-compose run --rm migrate-tg python /app/migrate_books.py
#   docker-compose run --rm migrate-tg python /app/migrate_tg_chapters.py --only-complete-books
#
# 环境变量:
#   SOURCE_DATABASE_URL  旧项目数据库连接串（源库）
#   DATABASE_URL         新项目数据库连接串（目标库）
#
# 两个数据库都可以通过 host.docker.internal 访问宿主机上的 PostgreSQL
# (Linux 上由 extra_hosts 自动解析，Docker Desktop 原生支持)
# ═══════════════════════════════════════════════════════════════

services:
  migrate-tg:
    build: .
    container_name: migrate_tg
    environment:
      # 旧项目数据库（源库）— 默认通过 host.docker.internal 访问宿主机
      - SOURCE_DATABASE_URL=${SOURCE_DATABASE_URL:-postgresql://audiobook_app:inriynisse1991@host.docker.internal:5432/audiobook}
      # 新项目数据库（目标库）— 请根据实际情况修改
      - DATABASE_URL=${DATABASE_URL:?请设置 DATABASE_URL 环境变量，指向新项目数据库}
    extra_hosts:
      - "host.docker.internal:host-gateway"
